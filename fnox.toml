#:schema https://fnox.jdx.dev/schema.json

default_provider = "op"

[providers.op]
type = "1password"
vault = "Dev Secrets"

[secrets]
# Required for vercel-ai-gateway agents and failure classification
AI_GATEWAY_API_KEY = { provider = "op", value = "agent-evals-exploration ai-gateway-api-key/password", if_missing = "warn" }

# Direct provider API keys (optional, only needed if not using AI Gateway)
ANTHROPIC_API_KEY = { provider = "op", value = "agent-evals-exploration anthropic-api-key/password", if_missing = "warn" }
OPENAI_API_KEY = { provider = "op", value = "agent-evals-exploration openai-api-key/password", if_missing = "warn" }
CURSOR_API_KEY = { provider = "op", value = "agent-evals-exploration cursor-api-key/password", if_missing = "warn" }

# Sanity MCP experiments
SANITY_AUTH_TOKEN = { provider = "op", value = "agent-evals-exploration sanity-staging-auth-token/password" }
SANITY_MCP_URL = { default = "https://mcp.sanity.work/" }
