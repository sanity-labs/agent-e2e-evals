#:schema https://mise.jdx.dev/schema/mise.json

[tools]
node = "24"
pnpm = "10"

[tasks.setup]
description = "Installs dependencies"
run = "pnpm install"

[tasks.typecheck]
description = "Runs TypeScript type checking"
run = "node --run typecheck"

[tasks.test]
description = "Runs tests"
run = "node --run test"

[tasks.lint]
description = "Runs oxlint"
run = "node --run lint"

[tasks."lint:fix"]
description = "Runs oxlint with --fix"
run = "node --run lint:fix"

[tasks.format]
description = "Checks formatting with oxfmt"
run = "node --run format"

[tasks."format:fix"]
description = "Formats files with oxfmt"
run = "node --run format:fix"

[tasks.up]
description = "Installs dependencies and starts tests in watch mode"
depends = ["setup"]
run = "fnox exec -- pnpm exec vitest"
