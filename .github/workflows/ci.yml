name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  versions:
    name: Read tool versions
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.read.outputs.node }}
      pnpm: ${{ steps.read.outputs.pnpm }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - id: read
        run: |
          echo "node=$(mise tool node --requested)" >> "$GITHUB_OUTPUT"
          echo "pnpm=$(mise tool pnpm --requested)" >> "$GITHUB_OUTPUT"

  ci:
    name: Typecheck, lint, format
    needs: versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: ${{ needs.versions.outputs.pnpm }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ needs.versions.outputs.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Knip
        run: pnpm run knip

      - name: Format
        run: pnpm run format
